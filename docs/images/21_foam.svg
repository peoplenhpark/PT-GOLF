  <line x1="196" y1="228" x2="300" y2="196" stroke="#516C66" stroke-width="27"/>
  <line x1="196" y1="228" x2="188" y2="248" stroke="#607D77" stroke-width="22"/>
  <line x1="188" y1="248" x2="230" y2="250" stroke="#607D77" stroke-width="14"/>
