<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="'Noto Sans KR','Apple SD Gothic Neo',sans-serif">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBFDFC"/><stop offset="1" stop-color="#E9F1EF"/></linearGradient>
<radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#E0982A" stop-opacity="0.42"/><stop offset="1" stop-color="#E0982A" stop-opacity="0"/></radialGradient>
<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#22332F" flood-opacity="0.20"/></filter>
</defs>
<rect x="2" y="2" width="476" height="296" rx="20" fill="url(#bg)" stroke="#DBE5E2" stroke-width="2"/>
<text x="28" y="42" font-size="19" font-weight="700" fill="#2B3A36">이상근 스트레칭 (누워 다리 교차)</text>
<line x1="28" y1="54" x2="452" y2="54" stroke="#E4EBE9" stroke-width="2"/>
<rect x="60" y="250" width="360" height="10" rx="5" fill="#CBD8D3"/>
<ellipse cx="236" cy="196" rx="42" ry="30" fill="url(#glow)"/>
<g filter="url(#soft)" stroke-linecap="round">
  <line x1="96" y1="240" x2="206" y2="240" stroke="#516C66" stroke-width="28"/>
  <line x1="206" y1="238" x2="228" y2="184" stroke="#607D77" stroke-width="24"/>
  <line x1="228" y1="184" x2="270" y2="210" stroke="#607D77" stroke-width="22"/>
  <line x1="214" y1="200" x2="260" y2="182" stroke="#5EA093" stroke-width="20"/>
  <line x1="150" y1="240" x2="220" y2="196" stroke="#6A8781" stroke-width="13"/>
  <circle cx="80" cy="230" r="18" fill="#516C66"/>
  <circle cx="206" cy="239" r="14" fill="#516C66"/>
</g>
<text x="150" y="118" font-size="13.5" font-weight="600" fill="#2B3A36">발을 반대쪽 무릎에 교차</text>
<text x="150" y="136" font-size="12" fill="#6E807B">뒤 허벅지 잡고 가슴 쪽으로 당기기</text>
<text x="150" y="152" font-size="12" fill="#6E807B">엉덩이 바깥(이상근)이 늘어나는 느낌</text>
<rect x="360" y="28" width="92" height="24" rx="12" fill="#EAF3F1" stroke="#CBDCD7"/>
<text x="406" y="45" font-size="12.5" font-weight="700" fill="#14776A" text-anchor="middle">좌우 각 30초</text>
</svg>
